# Sensitive values. In production, prefer an external secret manager
# (External Secrets Operator, Vault, AWS Secrets Manager, etc.) and
# generate this Secret from there — do NOT commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: im-gateway-secret
  namespace: __NAMESPACE__
  labels:
    app: im-gateway
    app.kubernetes.io/part-of: im
type: Opaque
stringData:
  jwt-secret: "__JWT_SECRET__"
