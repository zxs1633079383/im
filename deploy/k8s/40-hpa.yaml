# HorizontalPodAutoscaler: CPU-based scaling out of the box. To enable
# scaling on active WS connections, install prometheus-adapter and
# uncomment the external metric block below. Metric name reference:
# im.ws.active_connections (OTel) -> im_ws_active_connections (Prom).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: im-gateway
  namespace: __NAMESPACE__
  labels:
    app: im-gateway
    app.kubernetes.io/part-of: im
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: im-gateway
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Min
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # - type: Pods
    #   pods:
    #     metric:
    #       name: im_ws_active_connections
    #     target:
    #       type: AverageValue
    #       averageValue: "50000"
