# Kustomize entry point. Render via:
#   kubectl kustomize deploy/k8s/ > rendered.yaml
# or apply directly with -k (but note: these files still use placeholder
# strings like __NAMESPACE__; run scripts/v4-prepare.sh first to expand
# them into deploy/k8s/rendered/).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: __NAMESPACE__
resources:
  - 00-namespace.yaml
  - 10-configmap.yaml
  - 11-secret.yaml
  - 20-deployment.yaml
  - 30-service.yaml
  - 40-hpa.yaml
  - 50-pdb.yaml
images:
  - name: im-gateway
    newName: __REGISTRY__/im-gateway
    newTag: __IMAGE_TAG__
