services:
  postgres:
    image: postgres:16-alpine
    container_name: im-postgres
    environment:
      POSTGRES_USER: im
      POSTGRES_PASSWORD: im
      POSTGRES_DB: im
    ports:
      - "15432:5432"
    volumes:
      - im-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: im-redis
    ports:
      - "6379:6379"

  pulsar:
    image: apachepulsar/pulsar:3.3.0
    container_name: im-pulsar
    command: bin/pulsar standalone
    ports:
      - "6650:6650"
      - "8088:8080"
    volumes:
      - im-pulsardata:/pulsar/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: im-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: im-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

volumes:
  im-pgdata:
  im-pulsardata:
