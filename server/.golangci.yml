# server/.golangci.yml
run:
  timeout: 5m
  go: "1.26"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - rowserrcheck
issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck, unparam]
    - path: internal/repo/mocks/
      linters: [unused, gocritic, revive]
