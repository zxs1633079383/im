# server/.golangci.yml
run:
  timeout: 5m
  go: "1.26"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - rowserrcheck
issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck, unparam]
    - path: internal/repo/mocks/
      linters: [unused, gocritic, revive]
    # TODO: remove these once Phase 5 (store→repo) and Phase 6/7 (handler→Gin) complete
    - path: internal/store/
      linters: [errcheck, gosec, gocritic]
    - path: internal/handler/
      linters: [errcheck, gocritic, revive]
    - path: internal/gateway/
      linters: [revive]
    - path: internal/pulsar/
      linters: [errcheck]
